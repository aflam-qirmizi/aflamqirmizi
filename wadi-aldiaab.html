<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>وادي الذئاب الكمين - قرمزي</title>
<style>
    body{background:#0a0a0a;color:#fff;font-family:'Tajawal'}
    header{background:#111;padding:15px 5%;border-bottom:2px solid #ff0000}
    .logo a{color:#ff0000;text-decoration:none;font-size:28px;font-weight:bold}
    .container{padding:30px 5%}
    h1{margin-bottom:20px}
    .episodes{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px}
    .ep{background:#1a1a1a;border-radius:8px;text-align:center;position:relative}
    .ep img{width:100%;height:220px;object-fit:cover;border-radius:8px 8px 0 0}
    .ep a{color:#fff;text-decoration:none;display:block;padding:10px;font-weight:bold}
    .badge{position:absolute;top:10px;right:10px;background:#ff0000;padding:4px 8px;font-size:11px;border-radius:4px;animation:blink 1s infinite}
    @keyframes blink{0%,50%,100%{opacity:1} 25%,75%{opacity:0}}
</style>
</head>
<body>
<header><div class="logo"><a href="index.html">🐺 قرمزي</a></div></header>

<div class="container">
    <h1>وادي الذئاب الكمين - جميع الحلقات</h1>
    <div class="episodes">
        <div class="ep">
            <span class="badge">جديد</span>
            <img src="thumb310.jpg">
            <a href="player.html?ep=310">الحلقة 310</a>
        </div>
        <div class="ep">
            <img src="thumb309.jpg">
            <a href="player.html?ep=309">الحلقة 309</a>
        </div>
        <!-- كمل باقي الحلقات هنا -->
    </div>
</div>
</body>
</html>
