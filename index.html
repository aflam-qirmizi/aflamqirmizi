<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قرمزي</title>
  <style>
    body { background: #0d0d0d; color: #fff; font-family: 'Tahoma'; margin:0; }
    header { background: #e50914; padding: 15px; text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
    .card { background: #1a1a1a; border-radius: 10px; overflow: hidden; position: relative; }
    .card img { width: 100%; height: 260px; object-fit: cover; display: block; }
    .ep { position: absolute; top: 8px; right: 8px; background: #e50914; padding: 5px 10px; border-radius: 5px; font-size: 13px; font-weight: bold; }
    .info { padding: 10px; }
    a { text-decoration: none; color: white; }
  </style>
</head>
<body>
  <header><h1>قرمزي</h1></header>
  <div class="grid">
    <a href="daha-17-ep6.html" class="card">
      <div class="ep">حلقة 6</div>
      <img src="daha17.jpg" alt="DAHA 17">
      <div class="info">
        <h3>DAHA 17</h3>
        <p>مسلسل في السابعة عشرة الحلقة 6</p>
      </div>
    </a>
  </div>
</body>
</html>
